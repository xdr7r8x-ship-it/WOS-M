version: '3.8'

services:
  wos-m:
    build: .
    container_name: wos-m
    restart: unless-stopped
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_APPLICATION_ID=${DISCORD_APPLICATION_ID}
      - OWNER_DISCORD_ID=${OWNER_DISCORD_ID}
      - DEFAULT_LANGUAGE=${DEFAULT_LANGUAGE:-ar}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///data/wosm.sqlite}
      - WOS_API_BASE_URL=${WOS_API_BASE_URL:-}
      - GIFT_CODE_API_BASE_URL=${GIFT_CODE_API_BASE_URL:-}
      - CAPTCHA_SERVICE_URL=${CAPTCHA_SERVICE_URL:-}
      - OCR_SERVICE_URL=${OCR_SERVICE_URL:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
      - ./logs:/app/data/logs
    networks:
      - wos-m-network

networks:
  wos-m-network:
    driver: bridge
